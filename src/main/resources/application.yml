spring:
  application:
    name: online-store
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/online_store}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB       # Spring hard limit; business logic enforces 3MB per file
      max-request-size: 50MB    # max total upload per request

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:259200000}    # 3 days
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30 days
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  email-verification-expiry-hours: 24
  password-reset-expiry-minutes: 500
  upload:
    base-dir: ${UPLOAD_BASE_DIR:uploads}          # root upload directory; subdirs: products, categories, companies
    base-url: ${BASE_URL:http://localhost:8080}   # used to build public image URLs
    max-file-size-mb: ${UPLOAD_MAX_FILE_SIZE_MB:3}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${ADMIN_EMAIL:admin@online-store.uz}
    admin-password: ${ADMIN_PASSWORD:SuperAdmin@2024}
    admin-name: ${ADMIN_NAME:Super}
    admin-surname: ${ADMIN_SURNAME:Admin}
    admin-phone: ${ADMIN_PHONE:+998901234567}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    husniddin.online_store: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/online-store.log
    max-size: 10MB
    max-history: 30
