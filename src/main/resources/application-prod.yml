spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  jpa:
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    husniddin.online_store: INFO
  file:
    name: /var/log/online-store/app.log
